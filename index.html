<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI Dashboard 2026 — ATM & AE</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f4efe6;color:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px}
.top-bar{padding:20px 28px 12px;border-bottom:1px solid #ddd6c8;display:flex;align-items:baseline;gap:16px;position:sticky;top:0;background:#f4efe6;z-index:10}
.top-bar h1{font-size:18px;font-weight:700;color:#111;letter-spacing:-0.02em}
.top-meta{color:#7a7068;font-size:11px}
.brand-tabs{display:flex;gap:0;padding:0 28px;border-bottom:1px solid #ddd6c8;position:sticky;top:57px;background:#f4efe6;z-index:10}
.brand-tab{padding:10px 22px;border:none;border-bottom:2px solid transparent;background:transparent;color:#9a8f84;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.02em;margin-bottom:-1px;transition:color .15s}
.brand-tab:hover{color:#555}
.brand-tab.active-atm{color:#8c6a2f;border-bottom-color:#8c6a2f}
.brand-tab.active-ae{color:#1d6fa4;border-bottom-color:#1d6fa4}
.exec-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:#ddd6c8;border-bottom:1px solid #ddd6c8}
.exec-card{background:#faf6ef;padding:18px 22px}
.card-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9a8f84;margin-bottom:8px}
.card-value{font-size:24px;font-weight:700;color:#111;letter-spacing:-0.03em;line-height:1}
.card-sub{font-size:11px;color:#7a7068;margin-top:5px}
.card-var{font-size:11px;font-weight:700;margin-top:3px}
.vp{color:#2a7a3b}.vn{color:#b83232}.vw{color:#c27a10}
.section-wrap{padding:0 28px 28px}
.sec-head{display:flex;align-items:center;gap:10px;padding:20px 0 10px;border-top:2px solid #ddd6c8;margin-top:4px}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7a7068}
.bp{font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 7px;border-radius:3px}
.bp-atm{background:#fdf0d5;color:#8c6a2f;border:1px solid #c9a05a55}
.bp-ae{background:#ddeef8;color:#1d6fa4;border:1px solid #1d6fa455}
.tbl-wrap{overflow-x:auto;border:1px solid #ddd6c8;border-radius:4px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7a6e60;background:#ede8df;padding:7px 8px;text-align:right;white-space:nowrap;border-bottom:2px solid #ddd6c8;position:sticky;top:89px;z-index:4}
th.th-m{text-align:left;width:240px;min-width:240px;position:sticky;left:0;z-index:5;background:#ede8df}
th.th-mo{width:50px;min-width:44px}
th.th-sep{border-left:2px solid #c8c0b4!important}
th.th-ytd{width:68px;background:#e4ddd2!important}
th.th-ytgt{width:68px;background:#e4ddd2!important}
th.th-var{width:58px;background:#e4ddd2!important}
th.th-ann{width:70px}
th.th-bench{width:150px;text-align:left}
th.th-st{width:86px}
td{padding:10px 8px;text-align:right;border-bottom:1px solid #e4ddd2;white-space:nowrap;vertical-align:top;color:#9a8f84}
td.td-m{text-align:left;color:#2a2a2a;font-weight:500;position:sticky;left:0;background:#faf6ef;z-index:3;padding-left:4px;border-right:2px solid #ddd6c8;white-space:normal;line-height:1.4}
tr:nth-child(even) td{background:#f5f0e8}
tr:nth-child(even) td.td-m{background:#f5f0e8}
tr:hover td{background:#ede8df!important}
tr:hover td.td-m{background:#ede8df!important}
.cv-a{color:#111;font-weight:600}
.cv-t{color:#bbb6aa}
.mc-g{background:#eaf5ec!important}
.mc-y{background:#fdf7e3!important}
.mc-r{background:#fceaea!important}
td.td-ytd{color:#2a2a2a;font-weight:700;background:#ede8df!important}
td.td-ytgt{color:#7a7068;background:#ede8df!important}
td.td-var{font-weight:700;font-size:11px;background:#ede8df!important}
td.td-ann{color:#bbb6aa}
td.td-bench{text-align:left!important;color:#7a7068;font-size:10px;font-style:italic;white-space:normal;line-height:1.4;max-width:150px}
td.td-sep{border-left:2px solid #ddd6c8!important}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.p-g{background:#e8f5eb;color:#2a7a3b;border:1px solid #2a7a3b44}
.p-y{background:#fdf7e0;color:#c27a10;border:1px solid #c27a1044}
.p-r{background:#fceaea;color:#b83232;border:1px solid #b8323244}
.p-e{background:#f0ece6;color:#9a8f84;border:1px solid #ddd6c8}
.p-gap{background:#fff0e6;color:#c05a20;border:1px solid #c05a2044}
tr.gap-row td{background:#fff5ee!important}
tr.gap-row td.td-m{color:#c05a20;background:#fff5ee!important}
.legend{display:flex;gap:18px;padding:12px 28px 16px;border-top:1px solid #ddd6c8;flex-wrap:wrap;background:#f4efe6}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:#7a7068}
.ld{width:6px;height:6px;border-radius:50%}
.footer{color:#9a8f84;font-size:10px;padding:10px 28px 24px;background:#f4efe6}

.layer-row{border-top:1px solid #ddd6c8}
.layer-row td{background:#ede8df!important;padding:3px 8px;font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#7a6e60;border-bottom:2px solid #ddd6c8!important;white-space:nowrap}
.chart-toolbar{display:flex;align-items:center;gap:8px;padding:14px 28px;border-bottom:1px solid #ddd6c8;flex-wrap:wrap;background:#f4efe6;position:sticky;top:89px;z-index:3}
.chart-metric-lbl{font-size:10px;font-weight:700;color:#7a6e60;text-transform:uppercase;letter-spacing:.07em;margin-right:6px}
.chart-btn{padding:5px 14px;border:1px solid #ddd6c8;border-radius:3px;background:#faf6ef;color:#7a7068;font-size:11px;font-weight:600;cursor:pointer;transition:background .1s}
.chart-btn.cb-active,.chart-btn:hover{background:#ede8df;color:#2a2a2a;border-color:#b8b0a4}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:24px 28px}
.chart-panel{background:#faf6ef;border:1px solid #ddd6c8;border-radius:4px;padding:16px 20px 8px}
.chart-panel canvas{width:100%;display:block}
.chart-note{color:#9a8f84;font-size:10px;padding:0 28px 24px;font-style:italic}
.brand-tab.active-tr{color:#555;border-bottom-color:#555}

/* ── Visitors sub-tab ─────────────────────────────── */
.vis-month-bar{display:flex;align-items:center;gap:0;padding:12px 28px;border-bottom:1px solid #ddd6c8;background:#faf6ef;position:sticky;top:89px;z-index:3;flex-wrap:wrap;row-gap:8px}
.vis-month-lbl{font-size:10px;font-weight:700;color:#7a6e60;text-transform:uppercase;letter-spacing:.07em;margin-right:12px}
.vis-month-btn{padding:5px 16px;border:1px solid #ddd6c8;background:#f4efe6;color:#7a7068;font-size:11px;font-weight:600;cursor:pointer;margin-right:4px;border-radius:3px;transition:all .1s}
.vis-month-btn.vm-active{background:#2a2a2a;color:#fff;border-color:#2a2a2a}
.vis-panels{display:grid;grid-template-columns:1fr 1fr;min-height:600px}
.vis-panel{padding:22px 26px 36px;border-right:1px solid #ddd6c8}
.vis-panel:last-child{border-right:0}
.vis-brand-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid #ddd6c8}
.vis-brand-name{font-size:14px;font-weight:700;letter-spacing:-0.01em}
.vis-section-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#9a8f84;margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid #e4ddd2}
.vis-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.vis-stat{background:#fff;border:1px solid #ddd6c8;border-radius:4px;padding:12px 12px 10px}
.vis-stat-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9a8f84;margin-bottom:5px}
.vis-stat-val{font-size:19px;font-weight:700;color:#111;letter-spacing:-0.02em;line-height:1}
.vis-stat-sub{font-size:9px;color:#7a7068;margin-top:4px;line-height:1.3}
.vis-stat-yoy{font-size:10px;font-weight:700;margin-top:3px}
.vis-chart-box{background:#faf6ef;border:1px solid #ddd6c8;border-radius:4px;padding:10px 8px 4px;margin-bottom:14px}
.vis-occ-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px}
.vis-occ-cell{background:#faf6ef;border:1px solid #ddd6c8;border-radius:3px;padding:8px 8px 6px;text-align:center}
.vis-occ-mo{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9a8f84;margin-bottom:3px}
.vis-occ-val{font-size:14px;font-weight:700;color:#111;line-height:1}
.vis-occ-tgt{font-size:8px;color:#bbb6aa;margin-top:2px}
.vis-occ-bar{height:4px;border-radius:2px;margin-top:5px;background:#e4ddd2;overflow:hidden}
.vis-occ-fill{height:100%;border-radius:2px}
.vis-geo-item{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.vis-geo-name{font-size:10px;color:#2a2a2a;font-weight:500;width:72px;flex-shrink:0}
.vis-geo-bar-wrap{flex:1;height:8px;background:#e4ddd2;border-radius:4px;overflow:hidden}
.vis-geo-bar-fill{height:100%;border-radius:4px}
.vis-geo-pct{font-size:10px;color:#7a7068;font-weight:600;width:30px;text-align:right;flex-shrink:0}
.vis-country-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.vis-country-num{font-size:9px;color:#9a8f84;width:14px;text-align:right;flex-shrink:0}
.vis-country-name{font-size:10px;color:#2a2a2a;font-weight:500;flex:1}
.vis-country-bar-wrap{width:72px;height:5px;background:#e4ddd2;border-radius:3px;overflow:hidden;flex-shrink:0}
.vis-country-bar-fill{height:100%;border-radius:3px}
.vis-country-pct{font-size:10px;color:#7a7068;font-weight:600;width:26px;text-align:right;flex-shrink:0}
.vis-flag-row{display:flex;gap:16px;margin-bottom:10px}
.vis-flag-card{flex:1;background:#faf6ef;border:1px solid #ddd6c8;border-radius:4px;padding:10px 12px;text-align:center}
.vis-flag-val{font-size:18px;font-weight:700;color:#111;line-height:1}
.vis-flag-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9a8f84;margin-top:4px}
.vis-peer-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.vis-peer-name{font-size:10px;color:#2a2a2a;width:80px;flex-shrink:0}
.vis-peer-bar-wrap{flex:1;height:10px;background:#e4ddd2;border-radius:4px;overflow:hidden}
.vis-peer-bar-fill{height:100%;border-radius:4px}
.vis-peer-val{font-size:10px;font-weight:700;color:#2a2a2a;width:52px;text-align:right;flex-shrink:0}

/* ── AE Pulse (Test) ────────────────────────────────────── */
.pulse-wrap{padding:28px}
.pulse-header{margin-bottom:22px;padding-bottom:14px;border-bottom:2px solid #ddd6c8;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pulse-title{font-size:16px;font-weight:700;color:#1d6fa4;letter-spacing:-0.01em}
.pulse-sub{font-size:11px;color:#7a7068}
.pulse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.pulse-card{background:#fff;border:1px solid #ddd6c8;border-radius:6px;padding:18px 20px 14px;position:relative;overflow:hidden}
.pulse-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pc,#ddd6c8)}
.pulse-card-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#9a8f84;margin-bottom:8px}
.pulse-card-val{font-size:28px;font-weight:700;color:#111;letter-spacing:-0.03em;line-height:1;margin-bottom:8px}
.pulse-card-val.pc-na{font-size:16px;color:#7a7068;padding-top:6px}
.pulse-card-meta{font-size:10px;color:#7a7068;line-height:1.5}
.pulse-card-pill{position:absolute;top:14px;right:14px}
.pulse-sep{border:none;border-top:1px solid #ddd6c8;margin:0 0 20px}
.pulse-gaps-head{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#c05a20;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.pulse-gap-item{display:flex;align-items:flex-start;gap:12px;padding:8px 12px;background:#fff5ee;border:1px solid #f0d4c0;border-radius:4px;margin-bottom:6px}
.pulse-gap-name{font-size:11px;color:#2a2a2a;font-weight:500;white-space:nowrap;min-width:160px;flex-shrink:0}
.pulse-gap-bench{font-size:10px;color:#c05a20;font-style:italic;flex:1;line-height:1.4}


.pulse-funnel-row{margin-bottom:14px}
.pulse-stage-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#7a6e60;margin-bottom:6px;display:flex;align-items:center;gap:6px;padding-left:2px}
.pulse-stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.pulse-cards-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Pulse sub-navigation ────────────────────────────── */
.pulse-sub-nav{display:flex;gap:0;padding:0 28px;border-bottom:1px solid #ddd6c8;background:#faf6ef;position:sticky;top:89px;z-index:2;flex-wrap:wrap}
.psn-btn{padding:8px 18px;border:none;border-bottom:2px solid transparent;background:transparent;color:#9a8f84;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.02em;margin-bottom:-1px;transition:color .12s;white-space:nowrap}
.psn-btn:hover{color:#1d6fa4}
.psn-btn.psn-active{color:#1d6fa4;border-bottom-color:#1d6fa4}

/* ── Pulse sub-content wrap ──────────────────────────── */
.pulse-sub-wrap{padding:22px 28px 36px}

/* ── Breakdown list ──────────────────────────────────── */
.psub-breakdown{border:1px solid #ddd6c8;border-radius:4px;overflow:hidden;margin-bottom:4px}
.psub-header-row{display:flex;align-items:center;padding:6px 14px;background:#ede8df;border-bottom:2px solid #ddd6c8}
.psub-header-row span{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#7a6e60}
.psub-col-name{flex:3}
.psub-col-num{flex:1.2;text-align:right}
.psub-col-sm{flex:0.9;text-align:right}
.psub-col-st{flex:0 0 84px;text-align:right}
.psub-row{border-bottom:1px solid #e4ddd2;padding:9px 14px}
.psub-row:last-child{border-bottom:none}
.psub-row:nth-child(even){background:#faf6ef}
.psub-row-main{display:flex;align-items:baseline;gap:0}
.psub-actual{font-size:11px;font-weight:700;color:#111}
.psub-target{font-size:10px;color:#9a8f84}
.psub-name{flex:3;font-size:11px;color:#2a2a2a;font-weight:500}
.psub-await{color:#bbb6aa;font-weight:400;font-size:10px}
.psub-bench{font-size:9px;color:#9a8f84;font-style:italic;margin-top:3px;line-height:1.4}
.psub-divider{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#9a8f84;background:#f5f0e8;padding:5px 14px;border-bottom:1px solid #e4ddd2}
.psub-no-data{padding:18px 20px;background:#faf6ef;border:1px solid #ddd6c8;border-radius:4px;text-align:center;color:#9a8f84;font-size:10px;font-style:italic;margin-bottom:14px}
/* ── AE Social (Test) ───────────────────────────────────── */
.social-wrap{padding:0 28px 36px}
.social-header{padding:20px 0 14px;border-bottom:2px solid #ddd6c8;margin-bottom:4px;display:flex;align-items:center;gap:12px}
.social-title{font-size:15px;font-weight:700;color:#1d6fa4;letter-spacing:-0.01em}
.social-sub{font-size:11px;color:#7a7068}
.social-overview-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:4px}
.social-trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:4px}
.social-channels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:4px}
.social-channel{background:#faf6ef;border:1px solid #ddd6c8;border-radius:5px;padding:16px 18px}
.social-ch-head{font-size:11px;font-weight:700;color:#2a2a2a;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e4ddd2;letter-spacing:.01em}
.social-kpi-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0ece6}
.social-kpi-row:last-of-type{border-bottom:none}
.social-kpi-name{font-size:10px;color:#7a7068}
.social-kpi-val{font-size:11px;font-weight:700;color:#111}
.social-insight{font-size:9px;color:#7a7068;font-style:italic;margin-top:10px;line-height:1.5;padding:8px 10px;background:#f0ece6;border-radius:3px;border-left:2px solid #1d6fa455}
/* ── Paid Media Channel Layout ──────────────────────────── */
.paid-section-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7a6e60;margin:16px 0 8px;padding-bottom:6px;border-bottom:2px solid #ddd6c8}
.paid-tracker-wrap{overflow-x:auto;margin-bottom:4px;border:1px solid #ddd6c8;border-radius:4px}
.paid-tracker-table{width:100%;border-collapse:collapse;font-size:10px}
.paid-tracker-table thead tr{background:#ede8df}
.paid-tracker-table th{padding:7px 10px;text-align:left;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#7a6e60;border-bottom:2px solid #ddd6c8;white-space:nowrap}
.paid-tracker-table td{padding:7px 10px;border-bottom:1px solid #e4ddd2;vertical-align:middle}
.paid-tracker-table tr:last-child td{border-bottom:none}
.paid-tracker-table tr:nth-child(even) td{background:#faf6ef}
.ptk-name{font-weight:500;color:#2a2a2a;min-width:180px}
.ptk-thr{font-size:9px;white-space:nowrap}
.ptk-thr.ptk-min{color:#ef4444}
.ptk-thr.ptk-tgt{color:#15803d;font-weight:600}
.ptk-thr.ptk-str{color:#1d6fa4}
.ptk-num{font-weight:700;color:#111;text-align:right;white-space:nowrap}
.ptk-st{text-align:right;white-space:nowrap}
.paid-card{background:#faf6ef;border:1px solid #ddd6c8;border-radius:5px;padding:14px 16px}
.paid-card-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7a6e60;margin-bottom:6px}
.paid-card-val{font-size:20px;font-weight:700;color:#111;letter-spacing:-.02em;margin-bottom:6px}
.paid-card-val.pc-na{font-size:13px;color:#bbb6aa;font-weight:400}
.paid-card-thr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.pthr-min{font-size:8px;padding:2px 5px;background:#fef2f2;color:#ef4444;border-radius:3px}
.pthr-tgt{font-size:8px;padding:2px 5px;background:#f0fdf4;color:#15803d;border-radius:3px;font-weight:600}
.pthr-str{font-size:8px;padding:2px 5px;background:#eff6ff;color:#1d6fa4;border-radius:3px}
.paid-card-pill{margin-top:4px}
/* ── Pulse Overview — report style ────────────────────── */
.rpt-wrap{padding:4px 0 8px}
.rpt-section{margin:0 0 0}
.rpt-section+.rpt-section{border-top:1px solid #ece8e1;margin-top:24px;padding-top:24px}
.rpt-section-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#c4b9a8;margin-bottom:18px}
.rpt-pair{display:grid;grid-template-columns:1fr 1fr;gap:36px}
.rpt-val{font-size:40px;font-weight:700;letter-spacing:-.04em;line-height:1;margin-bottom:5px}
.rpt-val.rpt-na{font-size:18px;color:#bbb6aa;font-weight:400;letter-spacing:0}
.rpt-name{font-size:10px;color:#7a7068;font-weight:500;margin-bottom:4px;letter-spacing:.01em}
.rpt-ctx{font-size:9px;color:#9a8f84;margin-bottom:9px;line-height:1.5}
.rpt-bar-wrap{height:3px;background:#ece8e1;border-radius:2px;overflow:hidden}
.rpt-bar{height:3px;border-radius:2px;background:#1d6fa4}
/* ── AE Paid KPI Focus Table ──────────────────────── */
.kpif-wrap{margin-bottom:20px}
.kpif-title{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:2px;letter-spacing:-.01em}

const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmt(v,f){
  if(v===null||v===undefined)return null;
  if(f==='sek'){
    if(Math.abs(v)>=1000000)return(v/1000000).toFixed(1)+'M';
    if(Math.abs(v)>=1000)return(v/1000).toFixed(0)+'K';
    return v.toLocaleString('sv-SE');
  }
  if(f==='pct')return v.toFixed(1)+'%';
  if(f==='dec1')return v.toFixed(1)+'×';
  if(f==='dec2')return v.toFixed(2);
  if(Math.abs(v)>=1000000)return(v/1000000).toFixed(1)+'M';
  if(Math.abs(v)>=1000)return(v/1000).toFixed(1)+'K';
  return v.toLocaleString('sv-SE');
}

function isPct(f){return f==='pct'||f==='dec1';}

function ytd(arr,f){
  const v=arr.filter(x=>x!==null&&x!==undefined);
  if(!v.length)return null;
  if(isPct(f))return v.reduce((a,b)=>a+b,0)/v.length;
  return v.reduce((a,b)=>a+b,0);
}

function ytdTarget(actuals,targets,f){
  // sum/avg targets only for months that have actuals
  const idxs=actuals.map((v,i)=>v!==null&&v!==undefined?i:-1).filter(i=>i>=0);
  if(!idxs.length)return null;
  const tvals=idxs.map(i=>targets[i]).filter(v=>v!==null&&v!==undefined);
  if(!tvals.length)return null;
  if(isPct(f))return tvals.reduce((a,b)=>a+b,0)/tvals.length;
  return tvals.reduce((a,b)=>a+b,0);
}

function annTarget(targets,f){
  const v=targets.filter(x=>x!==null&&x!==undefined);
  if(!v.length)return null;
  if(isPct(f))return v.reduce((a,b)=>a+b,0)/v.length;
  return v.reduce((a,b)=>a+b,0);
}

function status(ytdA,ytdT,isGap,lib){
  if(isGap)return{cls:'p-gap',txt:'Gap'};
  if(ytdA===null||ytdT===null)return{cls:'p-e',txt:'—'};
  const pct=lib?(ytdT/ytdA)*100:(ytdA/ytdT)*100;
  if(pct>=100)return{cls:'p-g',txt:'On Track'};
  if(pct>=90)return{cls:'p-y',txt:'At Risk'};
  return{cls:'p-r',txt:'Off Track'};
}

function moCls(a,t,lib){
  if(a===null||a===undefined||t===null||t===undefined)return'';
  const pct=lib?(t/a)*100:(a/t)*100;
  if(pct>=100)return' mc-g';
  if(pct>=90)return' mc-y';
  return' mc-r';
}

function buildCards(id,brand){
  const d=DATA[brand];
  const visitSec=d.sections.find(s=>s.id==='visit');
  const vRow=visitSec.metrics.find(m=>m.label==='Visitors');
  const revRow=visitSec.metrics.find(m=>m.label==='Ticket Revenue (SEK)');

  // Visitor YTD
  const ytdVis=ytd(vRow.actuals,'num');
  const ytdVisTgt=ytdTarget(vRow.actuals,vRow.targets,'num');
  const visVar=ytdVis!==null&&ytdVisTgt?((ytdVis/ytdVisTgt-1)*100):null;

  // Revenue YTD (use actual revenue if available, else estimate from visitors)
  let ytdRevActual=null;
  if(revRow){ytdRevActual=ytd(revRow.actuals,'sek');}
  const ytdRevEst=ytdVis!==null?(ytdVis*d.avgTicket):null;
  const ytdRevDisplay=ytdRevActual!==null?ytdRevActual:ytdRevEst;
  const ytdRevTgt=revRow?ytdTarget(revRow.actuals,revRow.targets,'sek'):null;
  const revVar=ytdRevDisplay!==null&&ytdRevTgt?((ytdRevDisplay/ytdRevTgt-1)*100):null;

  // Gaps count
  let gaps=0,offTrackCount=0;
  d.sections.forEach(s=>s.metrics.forEach(m=>{
    if(m.is_divider){
      breakHtml+='<div class="psub-divider">'+he(m.label)+'</div>';
      return;
    }
    if(m.is_gap)gaps++;
    else{
      const a=ytd(m.actuals,m.fmt);
      const t=ytdTarget(m.actuals,m.targets,m.fmt);
      if(a!==null&&t!==null){
        const lib=m.lower_is_better||false;
        const p=lib?(t/a)*100:(a/t)*100;
        if(p<90)offTrackCount++;
      }
    }
  }));

  // Visitor pacing
  const vPaceCls=visVar===null?'':(visVar>=0?'vp':(visVar>=-10?'vw':'vn'));
  const vPaceTxt=visVar===null?'No data':(visVar>=0?'On Track':(visVar>=-10?'At Risk':'Off Track'));

  // Channel health — IG engagement
  const igSec=d.sections.find(s=>s.id==='ig');
  let igEngRow=igSec?igSec.metrics.find(m=>m.label.startsWith('Engagement Rate')):null;
  const igEngActual=igEngRow?ytd(igEngRow.actuals,'pct'):null;
  const igEngTgt=igEngRow?ytdTarget(igEngRow.actuals,igEngRow.targets,'pct'):null;
  const igEngCls=igEngActual===null?'':((igEngActual>=igEngTgt)?'vp':'vw');

  const el=document.getElementById(id);
  el.innerHTML=`
  <div class="exec-card">
    <div class="card-label">YTD Visitors</div>
    <div class="card-value">${ytdVis!==null?fmt(ytdVis,'num'):'—'}</div>
    <div class="card-sub">YTD target: ${ytdVisTgt!==null?fmt(ytdVisTgt,'num'):'—'} · Full year: ${fmt(d.fullYearTarget,'num')}</div>
    <div class="card-var">${visVar!==null?`<span class="${vPaceCls}">${visVar>=0?'+':''}${visVar.toFixed(1)}% vs YTD target</span>`:'<span style="color:#333">Awaiting data</span>'}</div>
  </div>
  <div class="exec-card">
    <div class="card-label">YTD Revenue</div>
    <div class="card-value">${ytdRevDisplay!==null?fmt(ytdRevDisplay,'sek'):'—'}</div>
    <div class="card-sub">${ytdRevActual!==null?'Ticket sales actual':'Visitors × '+d.avgTicket+' SEK (est.)'} · Target: ${ytdRevTgt!==null?fmt(ytdRevTgt,'sek'):'—'}</div>
    <div class="card-var">${revVar!==null?`<span class="${revVar>=0?'vp':(revVar>=-10?'vw':'vn')}">${revVar>=0?'+':''}${revVar.toFixed(1)}% vs target</span>`:'<span style="color:#333">—</span>'}</div>
  </div>
  <div class="exec-card">
    <div class="card-label">Visitor Pacing</div>
    <div class="card-value" style="font-size:20px;padding-top:2px"><span class="${vPaceCls}">${vPaceTxt}</span></div>
    <div class="card-sub">YTD actual vs YTD budget</div>
    <div class="card-var" style="color:#444">${visVar!==null?Math.abs(visVar).toFixed(1)+'% '+(visVar>=0?'ahead of':'behind') +' budget':'Awaiting data'}</div>
  </div>
  <div class="exec-card">
    <div class="card-label">Channel Engagement</div>
    <div class="card-value" style="font-size:20px;padding-top:2px"><span class="${igEngCls}">${igEngActual!==null?igEngActual.toFixed(1)+'%':'—'}</span></div>
    <div class="card-sub">IG engagement rate · Target: ${igEngTgt!==null?igEngTgt.toFixed(1)+'%':'—'}</div>
    <div class="card-var" style="color:#444">${igEngActual!==null&&igEngTgt?((igEngActual/igEngTgt*100).toFixed(0)+'% of target'):'Social performance'}</div>
  </div>
  <div class="exec-card">
    <div class="card-label">Alerts</div>
    <div class="card-value" style="color:${(offTrackCount+gaps)>0?'#ef4444':'#22c55e'}">${offTrackCount+gaps}</div>
    <div class="card-sub"><span style="color:#ef4444">${offTrackCount} off track</span> · <span style="color:#f97316">${gaps} tracking gaps</span></div>
    <div class="card-var" style="color:${(offTrackCount+gaps)>0?'#f97316':'#22c55e'}">${(offTrackCount+gaps)>0?'Review required':'All systems nominal'}</div>
  </div>`;
}

function buildTables(id,brand){
  const d=DATA[brand];
  const pill=brand==='atm'?'<span class="bp bp-atm">ATM</span>':'<span class="bp bp-ae">AE</span>';
  let html='';
  d.sections.forEach(sec=>{
    html+=`<div class="sec-head"><div class="sec-title">${sec.title}</div>${pill}</div>`;
    if(sec.id==='paid'){html+=buildPaidHTML(brand);return;}
    html+=`<div class="tbl-wrap"><table>`;
    // Header
    html+=`<thead><tr>
      <th class="th-m">Metric</th>`;
    MO.forEach(m=>html+=`<th class="th-mo">${m}</th>`);
    html+=`<th class="th-ytd th-sep">YTD</th>
      <th class="th-ytgt">YTD Tgt</th>
      <th class="th-var">Var%</th>
      <th class="th-ann">Ann. Target</th>
      <th class="th-bench">Benchmark</th>
      <th class="th-st">Status</th>
    </tr></thead><tbody>`;

    sec.metrics.forEach(m=>{
      if(m.is_divider){
        html+=`<tr class="layer-row"><td colspan="17">${m.label}</td></tr>`;
        return;
      }
      const lib=m.lower_is_better||false;
      const isGap=m.is_gap||false;
      const ytdA=ytd(m.actuals,m.fmt);
      const ytdT=ytdTarget(m.actuals,m.targets,m.fmt);
      const annT=annTarget(m.targets,m.fmt);
      const varPct=ytdA!==null&&ytdT?((lib?(ytdT/ytdA-1):(ytdA/ytdT-1))*100):null;
      const st=status(ytdA,ytdT,isGap,lib);

      let varHtml='<span style="color:#252525">—</span>';
      if(varPct!==null){
        const vc=varPct>=0?'vp':(varPct>=-10?'vw':'vn');
        varHtml=`<span class="${vc}">${varPct>=0?'+':''}${varPct.toFixed(1)}%</span>`;
      }

      const rowCls=isGap?' class="gap-row"':'';
      html+=`<tr${rowCls}>`;
      html+=`<td class="td-m">${m.label}</td>`;

      for(let i=0;i<12;i++){
        const a=m.actuals[i];
        const t=m.targets[i];
        const haA=a!==null&&a!==undefined;
        const haT=t!==null&&t!==undefined;
        const cls=haA?`cv-a${moCls(a,t,lib)}`:(haT?'cv-t':'');
        const val=haA?fmt(a,m.fmt):(haT?fmt(t,m.fmt):'');
        html+=`<td class="${cls}">${val||''}</td>`;
      }

      html+=`<td class="td-ytd td-sep">${ytdA!==null?fmt(ytdA,m.fmt):'—'}</td>`;
      html+=`<td class="td-ytgt">${ytdT!==null?fmt(ytdT,m.fmt):'—'}</td>`;
      html+=`<td class="td-var">${varHtml}</td>`;
      html+=`<td class="td-ann">${annT!==null?fmt(annT,m.fmt):'—'}</td>`;
      html+=`<td class="td-bench">${m.bench||''}</td>`;
      html+=`<td><span class="pill ${st.cls}">${st.txt}</span></td>`;
      html+=`</tr>`;
    });

    html+=`</tbody></table></div>`;
    // Section insight note
    if(sec.note){
      const nc=brand==='atm'?'#a0784033':'#0284c733';
      const tc=brand==='atm'?'#7a5c2e':'#0369a1';
      const bg=brand==='atm'?'#fdf7ee':'#eff8ff';
      html+=`<div style="margin:4px 0 12px;padding:8px 12px;background:${bg};border-left:2px solid ${nc};font-size:10px;color:${tc};line-height:1.5">${sec.note}</div>`;
    }
  });
  document.getElementById(id).innerHTML=html;
}

function drawVisTrendChart(canvasId,brand,color){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const W=canvas.parentElement.offsetWidth-20;
  if(W<=0)return;
  canvas.width=W;canvas.height=200;
  const ctx=canvas.getContext('2d');
  const sec=DATA[brand].sections.find(s=>s.id==='visit');
  const m=sec?sec.metrics.find(x=>x.label==='Visitors'):null;
  if(!m)return;
  const MO2=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const PAD={top:28,right:20,bottom:34,left:52};
  const CW=W-PAD.left-PAD.right;
  const CH=canvas.height-PAD.top-PAD.bottom;
  ctx.fillStyle='#faf6ef';ctx.fillRect(0,0,W,canvas.height);
  const actuals=m.actuals,targets=m.targets;
  const allV=[...actuals,...targets].filter(v=>v!==null&&v>0);
  if(!allV.length){ctx.fillStyle='#9a8f84';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('Awaiting data',W/2,canvas.height/2);return;}
  const maxV=Math.max(...allV)*1.1;
  const xS=i=>PAD.left+(i/11)*CW;
  const yS=v=>PAD.top+CH-(v/maxV)*CH;
  // Grid
  for(let i=0;i<=4;i++){
    const y=PAD.top+(i/4)*CH;
    ctx.beginPath();ctx.strokeStyle='#e4ddd2';ctx.lineWidth=1;
    ctx.moveTo(PAD.left,y);ctx.lineTo(W-PAD.right,y);ctx.stroke();
    const gv=maxV*(1-i/4);
    ctx.fillStyle='#9a8f84';ctx.font='8px -apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText(gv>=1000?Math.round(gv/1000)+'K':Math.round(gv),PAD.left-4,y+3);
  }
  // Target dashed
  const tPts=targets.map((v,i)=>v!=null?{x:xS(i),y:yS(v)}:null).filter(Boolean);
  if(tPts.length>1){ctx.beginPath();ctx.setLineDash([4,3]);ctx.strokeStyle='#bbb6aa';ctx.lineWidth=1.5;tPts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();ctx.setLineDash([]);}
  // Actuals fill + line
  const aPts=actuals.map((v,i)=>v!=null?{x:xS(i),y:yS(v)}:null).filter(Boolean);
  if(aPts.length>=2){
    ctx.beginPath();ctx.moveTo(aPts[0].x,aPts[0].y);aPts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(aPts[aPts.length-1].x,PAD.top+CH);ctx.lineTo(aPts[0].x,PAD.top+CH);ctx.closePath();
    ctx.fillStyle=color+'22';ctx.fill();
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;
    aPts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
  }
  aPts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='#faf6ef';ctx.lineWidth=1.5;ctx.stroke();});
  // Labels
  ctx.fillStyle='#7a7068';ctx.font='8px -apple-system,sans-serif';ctx.textAlign='center';
  MO2.forEach((mo,i)=>ctx.fillText(mo,xS(i),PAD.top+CH+14));
  // Title
  ctx.fillStyle=color;ctx.font='bold 10px -apple-system,sans-serif';ctx.textAlign='left';
  ctx.fillText('Monthly Visitors — Actual vs Target',PAD.left,14);
  // Legend
  const lx=W-PAD.right-82;
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.moveTo(lx,10);ctx.lineTo(lx+14,10);ctx.stroke();
  ctx.fillStyle='#2a2a2a';ctx.font='8px sans-serif';ctx.textAlign='left';ctx.fillText('Actual',lx+17,13);
  ctx.beginPath();ctx.setLineDash([4,3]);ctx.strokeStyle='#bbb6aa';ctx.lineWidth=1.5;ctx.moveTo(lx+48,10);ctx.lineTo(lx+62,10);ctx.stroke();ctx.setLineDash([]);
  ctx.fillText('Target',lx+65,13);
}

  const actOcc=brand==='atm'?atmActOcc:aeActOcc;
  const tgtOcc=vi.targets.occupancy;
  const allV=[...actOcc,...tgtOcc].filter(v=>v!==null&&v>0);

  for(let i=0;i<=4;i++){

    ctx.beginPath();ctx.strokeStyle='#e4ddd2';ctx.lineWidth=1;
    ctx.moveTo(PAD.left,y);ctx.lineTo(W-PAD.right,y);ctx.stroke();
    const gv=maxV*(1-i/4);
    ctx.fillStyle='#9a8f84';ctx.font='8px -apple-system,sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(gv)+'%',PAD.left-3,y+3);
  }
  const xS=i=>PAD.left+(i+0.5)*(CW/12);
  const yS=v=>PAD.top+CH-(v/maxV)*CH;
  // Target dots line
  const tPts=tgtOcc.map((v,i)=>({x:xS(i),y:yS(v)}));
  ctx.beginPath();ctx.setLineDash([3,3]);ctx.strokeStyle='#bbb6aa';ctx.lineWidth=1.5;
  tPts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();ctx.setLineDash([]);
  // Bars
  for(let i=0;i<12;i++){
    const av=actOcc[i];
    const tv=tgtOcc[i];
    const bH=av!==null?(av/maxV)*CH:0;
    const bX=xS(i)-bW/2;
    const bY=PAD.top+CH-bH;
    if(av!==null){
      const pct=av/tv*100;
      const fc=pct>=100?color+'cc':(pct>=90?'#eab308cc':'#ef4444cc');
      ctx.fillStyle=fc;
      ctx.fillRect(bX,bY,bW,bH);
    } else {
      ctx.fillStyle='#e4ddd2';
      ctx.fillRect(bX,PAD.top+CH-8,bW,8);
    }
    ctx.fillStyle='#7a7068';ctx.font='7px -apple-system,sans-serif';ctx.textAlign='center';
    ctx.fillText(MO2[i],xS(i),PAD.top+CH+12);
  }
}

function fmtY(v){
  if(v>=1000000)return(v/1000000).toFixed(1)+'M';
  if(v>=10000)return Math.round(v/1000)+'K';
  if(v>=1000)return(v/1000).toFixed(1)+'K';
  if(v<10)return v.toFixed(1);
  return Math.round(v).toString();
}

function drawLineChart(canvasId,brand,sectionId,metricLabel,color){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const W=canvas.parentElement.offsetWidth-40;
  if(W<=0)return;
  canvas.width=W; canvas.height=260;
  const ctx=canvas.getContext('2d');
  const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const PAD={top:40,right:28,bottom:42,left:58};
  const CW=W-PAD.left-PAD.right;
  const CH=canvas.height-PAD.top-PAD.bottom;

  ctx.fillStyle='#faf6ef';
  ctx.fillRect(0,0,W,canvas.height);

  const sec=DATA[brand].sections.find(s=>s.id===sectionId);
  const m=sec?sec.metrics.find(x=>x.label===metricLabel):null;

  if(!m){
    ctx.fillStyle='#9a8f84';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('No data available',W/2,canvas.height/2);
    return;
  }
  const actuals=m.actuals; const targets=m.targets;
  const allV=[...actuals,...targets].filter(v=>v!==null&&v!==undefined&&v>0);
  if(!allV.length){
    ctx.fillStyle='#9a8f84';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('Awaiting data',W/2,canvas.height/2);
    return;
  }
  const maxV=Math.max(...allV)*1.13; const minV=0;
  const xS=i=>PAD.left+(i/11)*CW;
  const yS=v=>PAD.top+CH-((v-minV)/(maxV-minV))*CH;

  // Grid lines + Y labels
  for(let i=0;i<=4;i++){
    const y=PAD.top+(i/4)*CH;
    ctx.beginPath();ctx.strokeStyle='#e4ddd2';ctx.lineWidth=1;
    ctx.moveTo(PAD.left,y);ctx.lineTo(W-PAD.right,y);ctx.stroke();
    const gv=minV+(maxV-minV)*(1-i/4);
    ctx.fillStyle='#9a8f84';ctx.font='9px -apple-system,sans-serif';
    ctx.textAlign='right';ctx.fillText(fmtY(gv),PAD.left-5,y+4);
  }

  // Target dashed line
  const tPts=targets.map((v,i)=>(v!=null)?{x:xS(i),y:yS(v)}:null).filter(Boolean);
  if(tPts.length>1){
    ctx.beginPath();ctx.setLineDash([5,4]);ctx.strokeStyle='#bbb6aa';ctx.lineWidth=1.5;
    tPts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.stroke();ctx.setLineDash([]);
  }

  // Actuals line + fill
  const aPts=actuals.map((v,i)=>(v!=null)?{x:xS(i),y:yS(v)}:null).filter(Boolean);
  if(aPts.length>=2){
    ctx.beginPath();
    ctx.moveTo(aPts[0].x,aPts[0].y);
    aPts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(aPts[aPts.length-1].x,PAD.top+CH);
    ctx.lineTo(aPts[0].x,PAD.top+CH);
    ctx.closePath();
    ctx.fillStyle=color+'1a';ctx.fill();
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;
    aPts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.stroke();
  }

  // Dots on actuals
  aPts.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,4.5,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();
    ctx.strokeStyle='#faf6ef';ctx.lineWidth=2;ctx.stroke();
  });

  // Month labels
  ctx.fillStyle='#7a7068';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='center';
  MO.forEach((mo,i)=>ctx.fillText(mo,xS(i),PAD.top+CH+16));

  // Brand title + metric name
  const bName=brand==='atm'?'ABBA The Museum':'Avicii Experience';
  ctx.fillStyle=color;ctx.font='bold 12px -apple-system,sans-serif';ctx.textAlign='left';
  ctx.fillText(bName,PAD.left,18);
  ctx.fillStyle='#7a7068';ctx.font='10px -apple-system,sans-serif';
  ctx.fillText(metricLabel,PAD.left,30);

  // Legend
  const lx=W-PAD.right-110;
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;
  ctx.moveTo(lx,16);ctx.lineTo(lx+18,16);ctx.stroke();
  ctx.beginPath();ctx.arc(lx+9,16,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  ctx.fillStyle='#2a2a2a';ctx.font='9px -apple-system,sans-serif';ctx.textAlign='left';
  ctx.fillText('Actual',lx+22,20);
  ctx.beginPath();ctx.setLineDash([5,4]);ctx.strokeStyle='#bbb6aa';ctx.lineWidth=1.5;
  ctx.moveTo(lx+60,16);ctx.lineTo(lx+78,16);ctx.stroke();ctx.setLineDash([]);
  ctx.fillText('Target',lx+82,20);
}

function buildPulseOverviewHTML(){
  const ae=DATA.ae;

  function getLatest(secId,label){
    const s=ae.sections.find(x=>x.id===secId);
    const m=s?s.metrics.find(x=>x.label===label):null;
    if(!m)return{actual:null,target:null,fmt:'num'};
    let li=-1;
    m.actuals.forEach((v,i)=>{if(v!==null&&v!==undefined)li=i;});
    const actual=li>=0?m.actuals[li]:null;
    const target=li>=0?m.targets[li]:(m.targets.find(v=>v!==null&&v!==undefined)||null);
    return{actual,target,fmt:m.fmt};
  }

  // Business Output — VI for YTD (AE visit actuals unreliable)
  const visitSec=ae.sections.find(x=>x.id==='visit');
  const visitMet=visitSec?visitSec.metrics.find(x=>x.label==='Visitors'):null;
  const visTarget=visitMet?ytdTarget([3087,3366,3194],visitMet.targets,'num'):null;
  const visActual=VI.ae.months.mar.visitors_ytd;
  const revMet=visitSec?visitSec.metrics.find(x=>x.label==='Ticket Revenue (SEK)'):null;
  const revTarget=revMet?ytdTarget([3087,3366,3194],revMet.targets,'sek'):null;
  const revActual=VI.ae.months.mar.ticket_ytd;
  const yoyYTD=VI.ae.months.mar.yoy_ytd;

  const ticketPaid=getLatest('paid','Ticket Purchases from Paid');
  const igReach=getLatest('ig','Reach');
  const ttViews=getLatest('tiktok','Total Views');
  const igEng=getLatest('ig','Engagement Rate %');
  const newsOpen=getLatest('crm','Open Rate %');

  function ragCl(a,t,lib){
    if(a===null||a===undefined)return'rpt-na';
    if(t===null||t===undefined)return'rpt-na';
    const ratio=lib?(t/a):(a/t);
    return ratio>=1?'vp':(ratio>=0.9?'vw':'vn');
  }

  function mkMet(name,valStr,valCl,barPct,ctxStr){
    return'<div class="rpt-metric">'
      +'<div class="rpt-met-name">'+he(name)+'</div>'
      +'<div class="rpt-val-lg '+valCl+'">'+valStr+'</div>'
      +'<div class="rpt-bar-wrap"><div class="rpt-bar" style="width:'+barPct.toFixed(1)+'%"></div></div>'
      +'<div class="rpt-met-ctx">'+ctxStr+'</div>'
      +'</div>';
  }

  function liveMet(d,name,lib){
    const a=d.actual,t=d.target,f=d.fmt;
    const cl=ragCl(a,t,lib);
    const valStr=a!==null?fmt(a,f):'—';
    const bp=(a!==null&&t!==null&&t!==0)?Math.min(100,lib?(t/a)*100:(a/t)*100):0;
    let ctx='';
    if(a!==null&&t!==null&&t!==0){
      const p=lib?(t/a)*100:(a/t)*100;
      const pcl=p>=100?'vp':(p>=90?'vw':'vn');
      ctx='Mål '+fmt(t,f)+' · <span class="'+pcl+'">'+p.toFixed(0)+'%</span>';
    }else if(a===null)ctx='Inväntar data';
    return mkMet(name,valStr,cl,bp,ctx);
  }

  // Visitor YTD (with YoY)
  function visMet(){
    const a=visActual,t=visTarget;
    const cl=ragCl(a,t,false);
    const valStr=a!==null?fmt(a,'num'):'—';
    const bp=(a!==null&&t!==null&&t!==0)?Math.min(100,(a/t)*100):0;
    let ctx='';
    if(a!==null&&t!==null){
      const p=(a/t)*100;
      const pcl=p>=100?'vp':(p>=90?'vw':'vn');
      ctx='Mål '+fmt(t,'num')+' · <span class="'+pcl+'">'+p.toFixed(0)+'%</span>';
    }
    if(yoyYTD!==null&&yoyYTD!==undefined){
      const ycl=yoyYTD>=0?'vp':'vn';

function buildPulseSecHTML(secId,overviewLabels){
  const ae=DATA.ae;
  const sec=ae.sections.find(s=>s.id===secId);
  if(!sec)return{html:'<div class="pulse-sub-wrap"><p style="color:#9a8f84;padding:20px">Section not found</p></div>',trendSecId:null,trendLabel:null};

  function latestOf(m){
    let li=-1;
    m.actuals.forEach((v,i)=>{if(v!==null&&v!==undefined)li=i;});
    return{actual:li>=0?m.actuals[li]:null,target:li>=0?m.targets[li]:(m.targets.find(v=>v!==null&&v!==undefined)||null)};
  }
  function ragPill(a,t,lib){
    if(a===null||t===null)return'<span class="pill p-e">\u2014</span>';
    const p=lib?(t/a)*100:(a/t)*100;
    if(p>=100)return'<span class="pill p-g">On Track</span>';
    if(p>=90) return'<span class="pill p-y">At Risk</span>';
    return'<span class="pill p-r">Off Track</span>';
  }
  function ragCl(a,t,lib){if(a===null||t===null)return'';const p=lib?(t/a)*100:(a/t)*100;return p>=100?'vp':(p>=90?'vw':'vn');}
  function pctStr(a,t,lib){if(a===null||t===null)return'\u2014';const p=lib?(t/a)*100:(a/t)*100;return'<span class="'+ragCl(a,t,lib)+'">'+p.toFixed(0)+'%</span>';}

  // ── Overview cards ──
  const cols=Math.min(overviewLabels.length,4);
  let overHtml='<div class="vis-section-lbl">Overview</div>'
    +'<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:10px;margin-bottom:4px">';
  overviewLabels.forEach(([lbl,lib])=>{
    const m=sec.metrics.find(x=>x.label===lbl&&!x.is_divider);
    if(!m){overHtml+='';return;}
    const{actual,target}=latestOf(m);
    const cl=ragCl(actual,target,lib);
    overHtml+='<div class="vis-stat">'
      +'<div class="vis-stat-lbl">'+he(lbl)+'</div>'
      +'<div class="vis-stat-val '+cl+'">'+(actual!==null?fmt(actual,m.fmt):'<span class="psub-await">Awaiting data</span>')+'</div>'
      +'<div class="vis-stat-sub">Target: '+(target!==null?fmt(target,m.fmt):'—')+'</div>'
      +'</div>';
  });
  overHtml+='</div>';

  // ── Trend chart — only when non-null, non-zero actuals exist ──
  const trendMet=sec.metrics.find(m=>!m.is_divider&&m.actuals.some(v=>v!==null&&v!==undefined&&v!==0));
  let trendHtml='<div class="vis-section-lbl">Trend</div>';
  if(trendMet){
    trendHtml+='<div class="vis-chart-box"><canvas id="psub-trend-'+secId+'" height="180"></canvas></div>';
  } else {
    trendHtml+='<div class="psub-no-data">Trend data available from Apr 2026</div>';
  }

  // ── Full breakdown: all metrics ──
  let breakHtml='<div class="vis-section-lbl">All Metrics</div>'
    +'<div class="psub-breakdown">'
    +'<div class="psub-header-row">'
    +'<span class="psub-col-name">Metric</span>'
    +'<span class="psub-col-num">Actual</span>'
    +'<span class="psub-col-num">Target</span>'
    +'<span class="psub-col-sm">vs Tgt</span>'
    +'<span class="psub-col-st">Status</span>'
    +'</div>';
  sec.metrics.forEach(m=>{
    if(m.is_divider)return;
    const lib=m.lower_is_better||false;
    const{actual,target}=latestOf(m);
    const gapStyle=m.is_gap?'background:#fff5ee':'';
    breakHtml+='<div class="psub-row" style="'+gapStyle+'">'
      +'<div class="psub-row-main">'
      +'<span class="psub-name">'+he(m.label)+'</span>'
      +'<span class="psub-col-num psub-actual">'+(actual!==null?fmt(actual,m.fmt):'<span class="psub-await">Awaiting data</span>')+'</span>'
      +'<span class="psub-col-num psub-target">'+(target!==null?fmt(target,m.fmt):'\u2014')+'</span>'
      +'<span class="psub-col-sm">'+pctStr(actual,target,lib)+'</span>'
      +'<span class="psub-col-st">'+ragPill(actual,target,lib)+'</span>'
      +'</div>'
      +(m.bench?'<div class="psub-bench">'+he(m.bench.replace(/^\u26a0\s*/,''))+'</div>':'')
      +'</div>';
  });
  breakHtml+='</div>';

  // Show section note if present
  let noteHtml='';
  if(sec.note){
    noteHtml='<div class="social-insight" style="margin-top:12px">'+he(sec.note)+'</div>';
  }

  const html='<div class="pulse-sub-wrap">'+overHtml+trendHtml+breakHtml+noteHtml+'</div>';
  return{html,trendSecId:trendMet?secId:null,trendLabel:trendMet?trendMet.label:null};
}


function buildPaidHTML(brand){
  const d=DATA[brand];
  const sec=d.sections.find(s=>s.id==='paid');
  if(!sec)return'<p style="color:#9a8f84;padding:20px">Paid section not found</p>';

  function getMet(lbl){return sec.metrics.find(m=>m.label===lbl)||null;}

  function curActual(m){
    let li=-1;
    m.actuals.forEach((v,i)=>{if(v!==null&&v!==undefined)li=i;});
    return li>=0?m.actuals[li]:null;
  }

  function bestTarget(m){
    return m.targets.find(v=>v!==null&&v!==undefined&&v!==0)||null;
  }

  function parseBT(bench){
    const r={min:'\u2014',stretch:'\u2014'};
    if(!bench)return r;
    bench.split('\u00b7').map(s=>s.trim()).forEach(s=>{
      if(/^Min:/i.test(s))r.min=s.replace(/^Min:\s*/i,'');
      if(/^Stretch:/i.test(s))r.stretch=s.replace(/^Stretch:\s*/i,'');
    });
    return r;
  }

  function parseMinNum(bench){
    if(!bench)return null;
    for(const s of bench.split('\u00b7').map(s=>s.trim())){
      if(/^Min:/i.test(s)){
        const m=s.replace(/,/g,'').match(/(\d+\.?\d*)/);
        return m?parseFloat(m[1]):null;
      }
    }
    return null;
  }

  function trackerSt(actual,target,minVal,lib){
    if(actual===null)return{cl:'p-e',label:'\u2014'};
    if(target===null)return{cl:'p-e',label:'No target'};
    const on=lib?actual<=target:actual>=target;
    if(on)return{cl:'p-g',label:'On Target'};
    if(minVal!==null){
      const ok=lib?actual<=minVal:actual>=minVal;
      if(ok)return{cl:'p-y',label:'At Risk'};
      return{cl:'p-r',label:'Below Min'};
    }
    const p=lib?(target/actual)*100:(actual/target)*100;
    return p>=85?{cl:'p-y',label:'At Risk'}:{cl:'p-r',label:'Off Track'};
  }

  // \u2500\u2500 KPI TRACKER \u2500\u2500
  let trkH='<div class="paid-section-lbl">KPI Tracker</div>'
    +'<div class="paid-tracker-wrap"><table class="paid-tracker-table">'
    +'<thead><tr>'
    +'<th class="ptk-name">KPI</th>'
    +'<th class="ptk-thr ptk-min">Min</th>'
    +'<th class="ptk-thr ptk-tgt">Target</th>'
    +'<th class="ptk-thr ptk-str">Stretch</th>'
    +'<th class="ptk-num">Current</th>'
    +'<th class="ptk-st">Status</th>'
    +'</tr></thead><tbody>';

  sec.metrics.filter(m=>!m.is_divider&&!m.is_gap).forEach(m=>{
    const actual=curActual(m);
    const target=bestTarget(m);
    const lib=m.lower_is_better||false;
    const minVal=parseMinNum(m.bench);
    const st=trackerSt(actual,target,minVal,lib);
    const bt=parseBT(m.bench||'');
    trkH+='<tr>'
      +'<td class="ptk-name">'+he(m.label)+'</td>'
      +'<td class="ptk-thr ptk-min">'+he(bt.min)+'</td>'
      +'<td class="ptk-thr ptk-tgt">'+(target!==null?fmt(target,m.fmt):'\u2014')+'</td>'
      +'<td class="ptk-thr ptk-str">'+he(bt.stretch)+'</td>'
      +'<td class="ptk-num">'+(actual!==null?fmt(actual,m.fmt):'<span style="color:#bbb6aa">Starts Apr</span>')+'</td>'
      +'<td class="ptk-st"><span class="pill '+st.cl+'">'+st.label+'</span></td>'
      +'</tr>';
  });
  trkH+='</tbody></table></div>';

  // \u2500\u2500 CHANNEL GROUPS \u2500\u2500
  const GROUPS=brand==='ae'?[
    {lbl:'Conversion & Revenue',mets:['Blended ROAS','CPA \u2014 Cost per Ticket (SEK)','Ticket Purchases from Paid','Revenue from Paid Ads (SEK)'],cols:4,bars:true},
    {lbl:'Google Search',mets:['Google Search CTR %','Google Search CPC (SEK)'],cols:2},
    {lbl:'Meta',mets:['Meta CTR %','Meta CPM (SEK)'],cols:2},
    {lbl:'TikTok',mets:['TikTok CPM (SEK)','TikTok CTR %','TikTok CPC (SEK)'],cols:3},
    {lbl:'Spend',mets:['Media Spend (SEK)'],cols:1},
  ]:[
    {lbl:'Conversion & Revenue',mets:['Blended ROAS','CPA \u2014 Cost per Ticket (SEK)','Ticket Purchases from Paid','Revenue from Paid Ads (SEK)'],cols:4,bars:true},
    {lbl:'Google Search',mets:['Google Search CTR %','Google Search CPC (SEK)'],cols:2},
    {lbl:'Meta',mets:['Meta CTR %','Meta CPM (SEK)','Meta CPC (SEK)'],cols:3},
    {lbl:'TikTok',mets:['TikTok CTR %','TikTok CPC (SEK)'],cols:2},
    {lbl:'Spend',mets:['Media Spend (SEK)'],cols:1},
  ];

  let grpH='';
  GROUPS.forEach(({lbl,mets,cols,bars})=>{
    grpH+='<div class="paid-section-lbl">'+he(lbl)+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:10px;margin-bottom:16px">';
    mets.forEach(ml=>{
      const m=getMet(ml);
      if(!m){
        grpH+='<div class="paid-card" style="opacity:.4"><div class="paid-card-lbl">'+he(ml)+'</div><div class="paid-card-val pc-na">Not tracked</div></div>';
        return;
      }
      const actual=curActual(m);
      const target=bestTarget(m);
      const lib=m.lower_is_better||false;
      const minVal=parseMinNum(m.bench);
      const st=trackerSt(actual,target,minVal,lib);
      const bt=parseBT(m.bench||'');
      const hasA=actual!==null;
      let barH='';
      if(bars&&hasA&&target!==null){
        const pct=Math.min(100,lib?(target/actual)*100:(actual/target)*100);
        const bc=st.cl==='p-g'?'#22c55e':(st.cl==='p-y'?'#eab308':'#ef4444');
        barH='<div style="margin-top:8px;height:4px;background:#ece8e1;border-radius:2px"><div style="width:'+pct.toFixed(0)+'%;height:4px;background:'+bc+';border-radius:2px"></div></div>';
      }
      grpH+='<div class="paid-card">'
        +'<div class="paid-card-lbl">'+he(m.label)+'</div>'
        +'<div class="paid-card-val'+(hasA?'':' pc-na')+'">'+(hasA?fmt(actual,m.fmt):'Starts Apr')+'</div>'
        +'<div class="paid-card-thr">'
        +(bt.min!=='\u2014'?'<span class="pthr-min">Min '+he(bt.min)+'</span>':'')
        +(target!==null?'<span class="pthr-tgt">Tgt '+fmt(target,m.fmt)+'</span>':'')
        +(bt.stretch!=='\u2014'?'<span class="pthr-str">\u2191 '+he(bt.stretch)+'</span>':'')
        +'</div>'
        +(hasA?'<div class="paid-card-pill"><span class="pill '+st.cl+'">'+st.label+'</span></div>':'')
        +barH
        +'</div>';
    });
    grpH+='</div>';
  });

  return'<div style="padding:0 0 12px">'+trkH+grpH+'</div>';
}

function buildATMPulseOverviewHTML(){
  const atm=DATA.atm;

  function getLatest(secId,label){
    const s=atm.sections.find(x=>x.id===secId);
    const m=s?s.metrics.find(x=>x.label===label):null;
    if(!m)return{actual:null,target:null,fmt:'num'};
    let li=-1;
    m.actuals.forEach((v,i)=>{if(v!==null&&v!==undefined)li=i;});
    const actual=li>=0?m.actuals[li]:null;
    const target=li>=0?m.targets[li]:(m.targets.find(v=>v!==null&&v!==undefined)||null);
    return{actual,target,fmt:m.fmt};
  }

  // Business Output — VI for YTD (visitor actuals as proxy)
  const visitSec=atm.sections.find(x=>x.id==='visit');
  const visitMet=visitSec?visitSec.metrics.find(x=>x.label==='Visitors'):null;
  const visTarget=visitMet?ytdTarget([16844,19227,21483],visitMet.targets,'num'):null;
  const visActual=VI.atm.months.mar.visitors_ytd;
  const revMet=visitSec?visitSec.metrics.find(x=>x.label==='Ticket Revenue (SEK)'):null;
  const revTarget=revMet?ytdTarget([16844,19227,21483],revMet.targets,'sek'):null;
  const revActual=VI.atm.months.mar.ticket_ytd;
  const yoyYTD=VI.atm.months.mar.yoy_ytd;

  const ticketPaid=getLatest('paid','Ticket Purchases from Paid');
  const igReach=getLatest('ig','Reach');
  const ttViews=getLatest('tiktok','Total Monthly Views');
  const igEng=getLatest('ig','Engagement Rate % (by impressions)');
  const newsOpen=getLatest('crm','Open Rate %');
  const roasData=getLatest('paid','Blended ROAS');

  function ragCl(a,t,lib){
    if(a===null||a===undefined)return'rpt-na';
    if(t===null||t===undefined)return'rpt-na';
    const ratio=lib?(t/a):(a/t);
    return ratio>=1?'vp':(ratio>=0.9?'vw':'vn');
  }

  function mkMet(name,valStr,valCl,barPct,ctxStr){
    return'<div class="rpt-metric">'
      +'<div class="rpt-met-name">'+he(name)+'</div>'
      +'<div class="rpt-val-lg '+valCl+'">'+valStr+'</div>'
      +'<div class="rpt-bar-wrap"><div class="rpt-bar" style="width:'+barPct.toFixed(1)+'%"></div></div>'
      +'<div class="rpt-met-ctx">'+ctxStr+'</div>'
      +'</div>';
  }

  function liveMet(d,name,lib){
    const a=d.actual,t=d.target,f=d.fmt;
    const cl=ragCl(a,t,lib);
    const valStr=a!==null?fmt(a,f):'—';
    const bp=(a!==null&&t!==null&&t!==0)?Math.min(100,lib?(t/a)*100:(a/t)*100):0;
    let ctx='';
    if(a!==null&&t!==null&&t!==0){
      const p=lib?(t/a)*100:(a/t)*100;
      const pcl=p>=100?'vp':(p>=90?'vw':'vn');
      ctx='Mål '+fmt(t,f)+' · <span class="'+pcl+'">'+p.toFixed(0)+'%</span>';
    }else if(a===null)ctx='Inväntar data';
    return mkMet(name,valStr,cl,bp,ctx);
  }

  function visMet(){
    const a=visActual,t=visTarget;
    const cl=ragCl(a,t,false);
    const valStr=a!==null?fmt(a,'num'):'—';
    const bp=(a!==null&&t!==null&&t!==0)?Math.min(100,(a/t)*100):0;
    let ctx='';
    if(a!==null&&t!==null){
      const p=(a/t)*100;
      const pcl=p>=100?'vp':(p>=90?'vw':'vn');
      ctx='Mål '+fmt(t,'num')+' · <span class="'+pcl+'">'+p.toFixed(0)+'%</span>';
    }
    if(yoyYTD!==null&&yoyYTD!==undefined){
      const ycl=yoyYTD>=0?'vp':'vn';
      ctx+=(ctx?' · ':'')+'YoY: <span class="'+ycl+'">'+(yoyYTD>=0?'+':'')+yoyYTD+'%</span>';
    }
    if(!ctx)ctx='Inväntar data';
    return mkMet('Besökare YTD · jan–mar',valStr,cl,bp,ctx);
  }

  function revMetFn(){
    const a=revActual,t=revTarget;
    const cl=ragCl(a,t,false);
    const valStr=a!==null?fmt(a,'sek'):'—';
    const bp=(a!==null&&t!==null&&t!==0)?Math.min(100,(a/t)*100):0;
    let ctx='';
    if(a!==null&&t!==null&&t!==0){
      const p=(a/t)*100;
      const pcl=p>=100?'vp':(p>=90?'vw':'vn');
      ctx='Mål '+fmt(t,'sek')+' · <span class="'+pcl+'">'+p.toFixed(0)+'%</span>';
    }else ctx='Inväntar data';
    return mkMet('Intäkter YTD · jan–mar',valStr,cl,bp,ctx);
  }

  function roasMetFn(){
    if(roasData.actual===null)return mkMet('Blended ROAS','—','rpt-na',0,'Startar april 2026');
    return liveMet(roasData,'Blended ROAS',false);
  }

  function phMet(name,ctxStr){
    return'<div class="rpt-metric">'
      +'<div class="rpt-met-name">'+he(name)+'</div>'
      +'<div class="rpt-val-ph">xx</div>'
      +'<div class="rpt-bar-wrap"></div>'
      +'<div class="rpt-met-ctx">'+he(ctxStr)+'</div>'
      +'</div>';
  }

  const gaps=[];
  atm.sections.forEach(sec=>{sec.metrics.forEach(m=>{if(m.is_gap)gaps.push({label:m.label,bench:(m.bench||'').replace(/^\u26a0\s*/,'')});});});
  let gapsHtml='';
  if(gaps.length){
    gapsHtml='<hr class="pulse-sep"><div class="pulse-gaps-head">\u26a0 Tracking Gaps ('+gaps.length+')</div>';
    gaps.forEach(g=>{gapsHtml+='<div class="pulse-gap-item"><span class="pulse-gap-name">'+g.label+'</span><span class="pulse-gap-bench">'+he(g.bench)+'</span></div>';});
  }

  return'<div class="pulse-wrap">'
    +'<div class="ov-hdr">'
    +'<span class="ov-hdr-title">ABBA The Museum — KPI Pulse</span>'
    +'<span class="ov-hdr-date">Jan – Mar 2026 · uppdaterad mars 2026</span>'
    +'</div>'
    +'<hr class="ov-rule">'

    +'<div class="rpt-section">'
    +'<div class="rpt-sec-lbl2">Business Output &amp; Paid Media</div>'
    +'<div class="rpt-4col">'
    +visMet()
    +revMetFn()
    +liveMet(ticketPaid,'Ticketköp via paid',false)
    +roasMetFn()
    +'</div></div>'

    +'<div class="rpt-section">'
    +'<div class="rpt-sec-lbl2">Social — Räckvidd &amp; Engagemang</div>'
    +'<div class="rpt-4col">'
    +liveMet(igReach,'IG Räckvidd · senaste mån',false)
    +liveMet(ttViews,'TikTok visningar · senaste mån',false)
    +liveMet(igEng,'IG engagemangsgrad · senaste mån',false)
    +liveMet(newsOpen,'Nyhetsbrev öppningsgrad · senaste mån',false)
    +'</div></div>'

    +'<div class="rpt-section">'
    +'<div class="rpt-sec-lbl2">OOH / DOOH</div>'
    +'<div class="rpt-pair">'
    +phMet('Räckvidd','Mål sätt mål · ej satt')
    +phMet('Share of Voice','Mål sätt mål · ej satt')
    +'</div></div>'

    +'<div class="rpt-section">'
    +'<div class="rpt-sec-lbl2">Events &amp; PR</div>'
    +'<div class="rpt-pair">'
    +phMet('Earned Reach','')
    +phMet('Events Count','')
    +'</div></div>'

    +'<div class="rpt-section">'
    +'<div class="rpt-sec-lbl2">Search &amp; Website</div>'
    +'<div class="rpt-pair">'
    +phMet('Web \u2192 Ticket CVR','')
    +phMet('Search Clicks','')
    +'</div></div>'

    +gapsHtml
    +'</div>';
}

function buildATMPulseSecHTML(secId,overviewLabels){
  const atm=DATA.atm;
  const sec=atm.sections.find(s=>s.id===secId);
  if(!sec)return{html:'<div class="pulse-sub-wrap"><p style="color:#9a8f84;padding:20px">Section not found</p></div>',trendSecId:null,trendLabel:null};

  function latestOf(m){
    let li=-1;
    m.actuals.forEach((v,i)=>{if(v!==null&&v!==undefined)li=i;});
    return{actual:li>=0?m.actuals[li]:null,target:li>=0?m.targets[li]:(m.targets.find(v=>v!==null&&v!==undefined)||null)};
  }
  function ragPill(a,t,lib){
    if(a===null||t===null)return'<span class="pill p-e">\u2014</span>';
    const p=lib?(t/a)*100:(a/t)*100;
    if(p>=100)return'<span class="pill p-g">On Track</span>';
    if(p>=90)return'<span class="pill p-y">At Risk</span>';
    return'<span class="pill p-r">Off Track</span>';
  }
  function ragCl(a,t,lib){if(a===null||t===null)return'';const p=lib?(t/a)*100:(a/t)*100;return p>=100?'vp':(p>=90?'vw':'vn');}
  function pctStr(a,t,lib){if(a===null||t===null)return'\u2014';const p=lib?(t/a)*100:(a/t)*100;return'<span class="'+ragCl(a,t,lib)+'">'+p.toFixed(0)+'%</span>';}

  const cols=Math.min(overviewLabels.length,4);
  let overHtml='<div class="vis-section-lbl">Overview</div>'
    +'<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:10px;margin-bottom:4px">';
  overviewLabels.forEach(([lbl,lib])=>{
    const m=sec.metrics.find(x=>x.label===lbl&&!x.is_divider);
    if(!m){overHtml+='';return;}
    const{actual,target}=latestOf(m);
    const cl=ragCl(actual,target,lib);
    overHtml+='<div class="vis-stat">'
      +'<div class="vis-stat-lbl">'+he(lbl)+'</div>'
      +'<div class="vis-stat-val '+cl+'">'+( actual!==null?fmt(actual,m.fmt):'<span class="psub-await">Awaiting data</span>')+'</div>'
      +'<div class="vis-stat-sub">Target: '+(target!==null?fmt(target,m.fmt):'\u2014')+'</div>'
      +'</div>';
  });
  overHtml+='</div>';

  const trendMet=sec.metrics.find(m=>!m.is_divider&&m.actuals.some(v=>v!==null&&v!==undefined&&v!==0));
  let trendHtml='<div class="vis-section-lbl">Trend</div>';
  if(trendMet){
    trendHtml+='<div class="vis-chart-box"><canvas id="atm-psub-trend-'+secId+'" height="180"></canvas></div>';
  }else{
    trendHtml+='<div class="psub-no-data">Trend data available from Apr 2026</div>';
  }

  let breakHtml='<div class="vis-section-lbl">All Metrics</div>'
    +'<div class="psub-breakdown">'
    +'<div class="psub-header-row">'
    +'<span class="psub-col-name">Metric</span>'
    +'<span class="psub-col-num">Actual</span>'
    +'<span class="psub-col-num">Target</span>'
    +'<span class="psub-col-sm">vs Tgt</span>'
    +'<span class="psub-col-st">Status</span>'
    +'</div>';
  sec.metrics.forEach(m=>{
    if(m.is_divider)return;
    const lib=m.lower_is_better||false;
    const{actual,target}=latestOf(m);
    const gapStyle=m.is_gap?'background:#fff5ee':'';
    breakHtml+='<div class="psub-row" style="'+gapStyle+'">'
      +'<div class="psub-row-main">'
      +'<span class="psub-name">'+he(m.label)+'</span>'
      +'<span class="psub-col-num psub-actual">'+(actual!==null?fmt(actual,m.fmt):'<span class="psub-await">Awaiting data</span>')+'</span>'
      +'<span class="psub-col-num psub-target">'+(target!==null?fmt(target,m.fmt):'\u2014')+'</span>'
      +'<span class="psub-col-sm">'+pctStr(actual,target,lib)+'</span>'
      +'<span class="psub-col-st">'+ragPill(actual,target,lib)+'</span>'
      +'</div>'
      +(m.bench?'<div class="psub-bench">'+he(m.bench.replace(/^\u26a0\s*/,''))+'</div>':'')
      +'</div>';
  });
  breakHtml+='</div>';

  let noteHtml='';
  if(sec.note){noteHtml='<div class="social-insight" style="margin-top:12px">'+he(sec.note)+'</div>';}

  return{html:'<div class="pulse-sub-wrap">'+overHtml+trendHtml+breakHtml+noteHtml+'</div>',
    trendSecId:trendMet?secId:null,trendLabel:trendMet?trendMet.label:null};
}

function buildATMSocialOverviewHTML(){
  const atm=DATA.atm;
  const igSec=atm.sections.find(s=>s.id==='ig');
  const ttSec=atm.sections.find(s=>s.id==='tiktok');
  const fbSec=atm.sections.find(s=>s.id==='fb');

  function latest(sec,label){
    if(!sec)return{a:null,t:null,fmt:'num'};
    const m=sec.metrics.find(x=>x.label===label);
    if(!m)return{a:null,t:null,fmt:'num'};
    let li=-1;
    m.actuals.forEach((v,i)=>{if(v!==null&&v!==undefined)li=i;});
    return{a:li>=0?m.actuals[li]:null,t:li>=0?m.targets[li]:null,fmt:m.fmt};
  }
  function ragCl(a,t,lib){
    if(a===null||t===null)return'';
    const p=lib?(t/a)*100:(a/t)*100;
    return p>=100?'vp':(p>=90?'vw':'vn');
  }
  function fmtOrDash(a,f){return a!==null?fmt(a,f):'\u2014';}

  const overKPIs=[
    {lbl:'IG Reach',           ...latest(igSec,'Reach')},
    {lbl:'IG Engagement Rate', ...latest(igSec,'Engagement Rate % (by impressions)')},
    {lbl:'TikTok Views/Video', ...latest(ttSec,'Views per Video')},
    {lbl:'FB Reach',           ...latest(fbSec,'Reach')},
    {lbl:'FB Engagement Rate', ...latest(fbSec,'Engagement Rate %')},
  ];
  let overHtml='';
  overKPIs.forEach(k=>{
    const cl=ragCl(k.a,k.t,false);
    overHtml+='<div class="vis-stat">'
      +'<div class="vis-stat-lbl">'+k.lbl+'</div>'
      +'<div class="vis-stat-val '+cl+'">'+fmtOrDash(k.a,k.fmt)+'</div>'
      +'<div class="vis-stat-sub">Target: '+fmtOrDash(k.t,k.fmt)+'</div>'
      +'</div>';
  });

  function chRows(sec,metrics){
    if(!sec)return'<div style="color:#9a8f84;font-size:10px;padding:8px 0">No data available</div>';
    let h='';
    metrics.forEach(item=>{
      if(typeof item==='string'){
        h+='<div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#7a6e60;padding:6px 0 3px;margin-top:6px;border-top:1px solid #e4ddd2">'+item+'</div>';
        return;
      }
      const[lbl,lib,isGap]=item;
      const m=sec.metrics.find(x=>x.label===lbl);
      if(!m||m.is_divider)return;
      let li=-1;
      m.actuals.forEach((v,i)=>{if(v!==null&&v!==undefined)li=i;});
      const a=li>=0?m.actuals[li]:null;
      const t=li>=0?m.targets[li]:null;
      const cl=ragCl(a,t,lib||false);
      const bg=isGap?'background:#fff5ee;':'';
      h+='<div class="social-kpi-row" style="'+bg+'">'
        +'<span class="social-kpi-name">'+lbl+(isGap?' \u26a0':'')+'</span>'
        +'<span class="social-kpi-val '+cl+'">'+fmtOrDash(a,m.fmt)+'</span>'
        +'</div>';
    });
    return h;
  }

  function secNote(sec){
    if(!sec||!sec.note)return'';
    return'<div class="social-insight">'+sec.note+'</div>';
  }

  const igRows=chRows(igSec,[
    ['Total Followers',false],['Follower Growth',false],['Reach',false],['Impressions',false],
    'MID FUNNEL',
    ['Profile Visits',false],['Link Clicks',false],['Link CTR %',false],
    ['Engagement Rate % (by impressions)',false],['Content Interactions',false],
    'BOTTOM FUNNEL',
    ['Website Visits from IG',false,true],['Social \u2192 Ticket CVR %',false,true],
    ['Ticket Purchases from Social',false,true],
  ]);
  const ttRows=chRows(ttSec,[
    ['Views per Video',false],['Total Monthly Views',false],['Total Watch Time (hours)',false],
    ['Avg Watch Time (sec)',false],['Completion Rate %',false],

// ── AE PAID PULSE OVERVIEW ────────────────────────────────────────────
function buildAEPaidPulseHTML(){
  const d=DATA.ae;
  const sec=d.sections.find(s=>s.id==='paid');
  if(!sec)return'<p style="color:#9a8f84;padding:20px">Paid section not found</p>';

  function getMet(lbl){return sec.metrics.find(m=>m.label===lbl)||null;}

  function curActual(m){
    if(!m)return null;
    let li=-1;
    m.actuals.forEach((v,i)=>{if(v!==null&&v!==undefined)li=i;});
    return li>=0?m.actuals[li]:null;
  }

  function bestTarget(m){
    if(!m)return null;
    return m.targets.find(v=>v!==null&&v!==undefined&&v!==0)||null;
  }

  function parseBT(bench){
    const r={min:'—',stretch:'—'};
    if(!bench)return r;
    bench.split('·').map(s=>s.trim()).forEach(s=>{
      if(/^Min:/i.test(s))r.min=s.replace(/^Min:\s*/i,'');
      if(/^Stretch:/i.test(s))r.stretch=s.replace(/^Stretch:\s*/i,'');
    });
    return r;
  }

  function parseMinNum(bench){
    if(!bench)return null;
    for(const s of bench.split('·').map(s=>s.trim())){
      if(/^Min:/i.test(s)){
        const m=s.replace(/,/g,'').match(/(\d+\.?\d*)/);
        return m?parseFloat(m[1]):null;
      }
    }
    return null;
  }

  function kpiSt(actual,target,minVal,lib){
    if(actual===null)return{cl:'p-e',label:'Starts Apr'};
    if(target===null)return{cl:'p-e',label:'No target'};
    const on=lib?actual<=target:actual>=target;
    if(on)return{cl:'p-g',label:'On Target'};
    if(minVal!==null){
      const ok=lib?actual<=minVal:actual>=minVal;
      if(ok)return{cl:'p-y',label:'At Risk'};
      return{cl:'p-r',label:'Below Min'};
    }
    const p=lib?(target/actual)*100:(actual/target)*100;
    return p>=85?{cl:'p-y',label:'At Risk'}:{cl:'p-r',label:'Off Track'};
  }

  // ── SECTION 1: KPI FOCUS TABLE ──
  const KPIF=[
    {label:'ROAS (Total)',          met:'Blended ROAS',
     minTxt:'8×',  minVal:8,  tgtTxt:'12×', strTxt:'20×+', lib:false},
    {label:'CPA — Cost per ticket', met:'CPA — Cost per Ticket (SEK)',
     minTxt:'≤50 kr',minVal:50, tgtTxt:'≤35 kr', strTxt:'≤20 kr', lib:true},
    {label:'Ticket Volume / month', met:'Ticket Purchases from Paid',
     minTxt:'350',       minVal:350, tgtTxt:'480',   strTxt:'600+',  lib:false},
  ];

  let focusRows='';
  KPIF.forEach(k=>{
    const m=getMet(k.met);
    const actual=curActual(m);
    const target=m?bestTarget(m):null;
    const st=kpiSt(actual,target,k.minVal,k.lib);
    const curDisp=actual!==null
      ?'<strong>'+fmt(actual,m.fmt)+'</strong>'
      :'<span style="color:#bbb6aa">Starts Apr</span>';
    focusRows+='<tr>'
      +'<td>'+he(k.label)+'</td>'
      +'<td class="kpif-min-c">'+he(k.minTxt)+'</td>'
      +'<td class="kpif-tgt-c">'+he(k.tgtTxt)+'</td>'
      +'<td class="kpif-str-c">'+he(k.strTxt)+'</td>'
      +'<td class="kpif-cur">'+curDisp+'</td>'
      +'<td class="kpif-st"><span class="pill '+st.cl+'">'+st.label+'</span></td>'
      +'</tr>';
  });

  const focusHtml='<div class="kpif-wrap">'
    +'<div class="kpif-title">KPI Focus — Paid Media (Beet)</div>'
    +'<div class="kpif-sub">Avicii Experience · Monthly reporting</div>'
    +'<div class="kpif-tbl-wrap"><table class="kpif-table">'
    +'<thead><tr>'
    +'<th>KPI</th>'
    +'<th class="kpif-num">Minimum</th>'
    +'<th class="kpif-num">Target</th>'
    +'<th class="kpif-num">Stretch</th>'
    +'<th class="kpif-num">Current</th>'
    +'<th class="kpif-num">Status</th>'
    +'</tr></thead>'
    +'<tbody>'+focusRows+'</tbody>'
    +'<tfoot class="kpif-footer"><tr>'
    +'<td colspan="6">Minimum = floor. Below this = action required. · '
    +'Target = expected monthly delivery. · '
    +'Stretch = peak ambition based on TAS 2025.</td>'
    +'</tr></tfoot>'
    +'</table></div>'
    +'</div>';

  // ── SECTION 2: MONTHLY TREND TABLE ──
  const MTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const TREND=[
    {label:'ROAS (Total)',               met:'Blended ROAS',                  lib:false},
    {label:'CPA – Cost per ticket', met:'CPA — Cost per Ticket (SEK)',lib:true},
    {label:'Ticket Purchases / mo',      met:'Ticket Purchases from Paid',     lib:false},
  ];

  function mthBg(actual,target,lib){
    if(actual===null||actual===undefined)return'#f0ede8';
    if(target===null||target===undefined)return'#f0ede8';
    const ratio=lib?(target/actual):(actual/target);
    if(ratio>=1.0)return'#dcfce7';
    if(ratio>=0.9)return'#fef9c3';
    return'#fee2e2';
  }

  let trendRows='';
  TREND.forEach(r=>{
    const m=getMet(r.met);
    trendRows+='<tr><td class="kpif-mth-kpi">'+he(r.label)+'</td>';
    MTHS.forEach((_,i)=>{
      const actual=m?(m.actuals[i]!==undefined?m.actuals[i]:null):null;
      const target=m?(m.targets[i]!==undefined?m.targets[i]:null):null;
      const bg=mthBg(actual,target,r.lib);
      const hasA=actual!==null&&actual!==undefined;
      const hasTgt=target!==null&&target!==undefined;
      trendRows+='<td class="kpif-mth-cell" style="background:'+bg+'">';
      if(hasA)trendRows+='<div class="kpif-mth-act">'+fmt(actual,m.fmt)+'</div>';
      if(hasTgt)trendRows+='<div class="kpif-mth-tgt">'+fmt(target,m.fmt)+'</div>';
      trendRows+='</td>';
    });
    trendRows+='</tr>';
  });

  const trendHtml='<div class="kpif-wrap" style="margin-top:4px">'
    +'<div class="kpif-title">Monthly Performance — Jan–Dec 2026</div>'
    +'<div class="kpif-sub">Green = on/above target · Amber = within 10% below · Red = &gt;10% below · Grey = no data yet</div>'
    +'<div class="kpif-tbl-wrap kpif-mth-wrap"><table class="kpif-table kpif-mth-tbl">'
    +'<thead><tr><th class="kpif-mth-kpi-h">KPI</th>'
    +MTHS.map(m=>'<th class="kpif-mth-h">'+m+'</th>').join('')
    +'</tr></thead>'
    +'<tbody>'+trendRows+'</tbody>'
    +'</table></div>'
    +'</div>';

  // ── SECTION 3: CHANNEL GROUPS ──
  const GROUPS=[
    {lbl:'Conversion & Revenue',mets:['Blended ROAS','CPA — Cost per Ticket (SEK)','Ticket Purchases from Paid','Revenue from Paid Ads (SEK)'],cols:4,bars:true},
    {lbl:'Google Search',mets:['Google Search CTR %','Google Search CPC (SEK)'],cols:2},
    {lbl:'Meta',mets:['Meta CTR %','Meta CPM (SEK)'],cols:2},
    {lbl:'TikTok',mets:['TikTok CPM (SEK)','TikTok CTR %','TikTok CPC (SEK)'],cols:3},
    {lbl:'Spend',mets:['Media Spend (SEK)'],cols:1},
  ];

  let grpH='';
  GROUPS.forEach(({lbl,mets,cols,bars})=>{
    grpH+='<div class="paid-section-lbl">'+he(lbl)+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:10px;margin-bottom:16px">';
    mets.forEach(ml=>{
      const m=getMet(ml);
      if(!m){
        grpH+='<div class="paid-card" style="opacity:.4"><div class="paid-card-lbl">'+he(ml)+'</div><div class="paid-card-val pc-na">Not tracked</div></div>';
        return;
      }
      const actual=curActual(m);
      const target=bestTarget(m);
      const lib=m.lower_is_better||false;
      const minVal=parseMinNum(m.bench);
      const st=kpiSt(actual,target,minVal,lib);
      const bt=parseBT(m.bench||'');
      const hasA=actual!==null;
      let barH='';
      if(bars&&hasA&&target!==null){
        const pct=Math.min(100,lib?(target/actual)*100:(actual/target)*100);
        const bc=st.cl==='p-g'?'#22c55e':(st.cl==='p-y'?'#eab308':'#ef4444');
        barH='<div style="margin-top:8px;height:4px;background:#ece8e1;border-radius:2px"><div style="width:'+pct.toFixed(0)+'%;height:4px;background:'+bc+';border-radius:2px"></div></div>';
      }
      grpH+='<div class="paid-card">'
        +'<div class="paid-card-lbl">'+he(m.label)+'</div>'
        +'<div class="paid-card-val'+(hasA?'':' pc-na')+'">'+(hasA?fmt(actual,m.fmt):'Starts Apr')+'</div>'
        +'<div class="paid-card-thr">'
        +(bt.min!=='—'?'<span class="pthr-min">Min '+he(bt.min)+'</span>':'')
        +(target!==null?'<span class="pthr-tgt">Tgt '+fmt(target,m.fmt)+'</span>':'')
        +(bt.stretch!=='—'?'<span class="pthr-str">↑ '+he(bt.stretch)+'</span>':'')
        +'</div>'
        +(hasA?'<div class="paid-card-pill"><span class="pill '+st.cl+'">'+st.label+'</span></div>':'')
        +barH
        +'</div>';
    });
    grpH+='</div>';
  });

  return'<div style="padding:0 0 12px">'+focusHtml+trendHtml+grpH+'</div>';
}
